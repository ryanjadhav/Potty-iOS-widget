name: Potty
options:
  bundleIdPrefix: com.ryanjadhav
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  Potty:
    type: application
    platform: iOS
    sources:
      - path: Potty
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryanjadhav.potty
        INFOPLIST_FILE: Potty/Info.plist
        CODE_SIGN_ENTITLEMENTS: Potty/Potty.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
    dependencies:
      - target: PottyWidgetExtension
    entitlements:
      path: Potty/Potty.entitlements

  PottyWidgetExtension:
    type: app-extension
    platform: iOS
    product: PottyWidgetExtension
    sources:
      - path: PottyWidget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryanjadhav.potty.widget
        INFOPLIST_FILE: PottyWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: PottyWidget/PottyWidget.entitlements
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground
    entitlements:
      path: PottyWidget/PottyWidget.entitlements
